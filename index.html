<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowling Speed Calculator</title>
    <style>
        :root {
            --bg-color: #121212;
            --btn-idle: #1e1e1e;
            --btn-running: #ff2e63;
            --accent-color: #00adb5;
            --text-color: #eeeeee;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 画面の大部分を占める巨大なボタン */
        .mega-btn {
            background-color: var(--btn-idle);
            border: 3px solid var(--accent-color);
            border-radius: 20px;
            width: 90vw;
            max-width: 400px;
            height: 85vh;
            max-height: 650px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
            box-sizing: border-box;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
            transition: background-color 0.2s, transform 0.1s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        /* 計測中のスタイル */
        .mega-btn.running {
            background-color: var(--btn-running);
            border-color: #ff4a7d;
        }

        .mega-btn:active {
            transform: scale(0.98);
        }

        .status-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-align: center;
        }

        .mega-btn.running .status-text {
            color: #fff;
        }

        /* 3つの表示エリアをまとめるコンテナ */
        .display-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin: auto 0;
        }

        /* 時間・km/h・mph で共通のスタイル（サイズを同一に） */
        .display-item {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            box-sizing: border-box;
        }

        .display-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mega-btn.running .display-label {
            color: rgba(255, 255, 255, 0.6);
        }

        /* すべて同じフォントサイズに統一 */
        .display-value {
            font-size: 2.6rem;
            font-weight: bold;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

<button id="actionBtn" class="mega-btn">
    <div class="status-text" id="statusText">TAP TO START</div>
    
    <div class="display-section">
        <!-- TIME 表示 -->
        <div class="display-item">
            <div class="display-label">Time (sec)</div>
            <div class="display-value" id="display">0.000</div>
        </div>
        
        <!-- KM/H 表示 -->
        <div class="display-item">
            <div class="display-label">Speed (km/h)</div>
            <div class="display-value" id="speedKmh">-</div>
        </div>
        
        <!-- MPH 表示 -->
        <div class="display-item">
            <div class="display-label">Speed (mph)</div>
            <div class="display-value" id="speedMph">-</div>
        </div>
    </div>
</button>

<script>
    let startTime = 0;
    let elapsedTime = 0;
    let timerInterval = null;
    let isRunning = false;

    const actionBtn = document.getElementById('actionBtn');
    const statusText = document.getElementById('statusText');
    const display = document.getElementById('display');
    const speedKmhDisplay = document.getElementById('speedKmh');
    const speedMphDisplay = document.getElementById('speedMph');

    const DISTANCE_METERS = 18.288; 
    const DISTANCE_MILES = 1 / 88; 

    function updateTime() {
        elapsedTime = Date.now() - startTime;
        display.textContent = (elapsedTime / 1000).toFixed(3);
    }

    function calculateSpeed(seconds) {
        if (seconds <= 0) return;
        const kmh = (DISTANCE_METERS / seconds) * 3.6;
        const mph = DISTANCE_MILES / (seconds / 3600);
        speedKmhDisplay.textContent = kmh.toFixed(2);
        speedMphDisplay.textContent = mph.toFixed(2);
    }

    actionBtn.addEventListener('click', () => {
        if (!isRunning) {
            // スタート（自動リセット）
            elapsedTime = 0;
            display.textContent = '0.000';
            speedKmhDisplay.textContent = '-';
            speedMphDisplay.textContent = '-';

            startTime = Date.now();
            timerInterval = setInterval(updateTime, 10);
            
            statusText.textContent = 'TAP TO STOP';
            actionBtn.classList.add('running');
            isRunning = true;
        } else {
            // ストップ
            clearInterval(timerInterval);
            const finalSeconds = elapsedTime / 1000;
            calculateSpeed(finalSeconds);
            
            statusText.textContent = 'TAP TO RESTART';
            actionBtn.classList.remove('running');
            isRunning = false;
        }
    });
</script>

</body>
</html>
